<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrismAnalytics — Integration Playground</title>
  <style>
    :root {
      --bg: #09080d;
      --card-bg: #12101a;
      --border: rgba(139, 108, 245, 0.2);
      --text: #f4f3f6;
      --text-muted: #8c8896;
      --brand: #8b6cf5;
      --brand-glow: rgba(139, 108, 245, 0.15);
      --success: #10b981;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container {
      max-width: 600px;
      width: 90%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 40px -15px rgba(0,0,0,0.7);
      position: relative;
    }
    .glow {
      position: absolute;
      top: -10%;
      right: -10%;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, var(--brand-glow) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 48px;
      width: 48px;
      border-radius: 12px;
      background: linear-gradient(135deg, #8b6cf5, #ec7d75);
      color: #fff;
      font-weight: bold;
      font-size: 20px;
      box-shadow: 0 0 20px rgba(139, 108, 245, 0.4);
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    p {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.5;
    }
    .input-group {
      margin-bottom: 18px;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: all 0.2s ease;
    }
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-glow);
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }
    button {
      background: var(--brand);
      border: none;
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 16px -4px rgba(139, 108, 245, 0.3);
    }
    button.secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
    }
    button.secondary:hover {
      background: rgba(255,255,255,0.08);
      box-shadow: none;
    }
    .logs {
      margin-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 20px;
    }
    .log-box {
      background: #07060a;
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 14px;
      font-family: monospace;
      font-size: 11px;
      max-height: 150px;
      overflow-y: auto;
      color: #a39fae;
    }
    .log-entry {
      margin-bottom: 6px;
      display: flex;
      gap: 8px;
    }
    .log-time {
      color: var(--text-muted);
    }
    .log-msg.success {
      color: var(--success);
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="glow"></div>
    <div class="header">
      <div class="logo">PA</div>
      <h1>PrismAnalytics Playground</h1>
      <p>Verify your tracking setup and see live hits record instantly on your dashboard.</p>
    </div>

    <div class="input-group">
      <label for="workerUrl">Worker Endpoint URL</label>
      <input type="url" id="workerUrl" placeholder="https://prismanalytics.username.workers.dev" value="">
    </div>

    <div class="input-group">
      <label for="siteId">Tracking Code (Site ID)</label>
      <input type="text" id="siteId" placeholder="pa_xxxxxxxxx" value="">
    </div>

    <div class="actions">
      <button id="btnPageview">📡 Trigger Pageview</button>
      <button id="btnCustom" class="secondary">⚡ Custom Event</button>
    </div>

    <div class="logs">
      <label>Playground Console Logs</label>
      <div id="logBox" class="log-box">
        <div class="log-entry">
          <span class="log-time">[System]</span>
          <span class="log-msg">Playground ready. Enter endpoint and code to begin.</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Autofill values if in URL params
    const params = new URLSearchParams(window.location.search);
    if (params.has('site')) document.getElementById('siteId').value = params.get('site');
    if (params.has('worker')) document.getElementById('workerUrl').value = params.get('worker');
    if (!document.getElementById('workerUrl').value) {
      document.getElementById('workerUrl').value = window.location.origin;
    }

    const logBox = document.getElementById('logBox');

    function log(msg, type = '') {
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      
      const timeSpan = document.createElement('span');
      timeSpan.className = 'log-time';
      timeSpan.textContent = '[' + new Date().toLocaleTimeString() + ']';
      
      const msgSpan = document.createElement('span');
      msgSpan.className = 'log-msg ' + type;
      msgSpan.textContent = msg;
      
      entry.appendChild(timeSpan);
      entry.appendChild(msgSpan);
      logBox.appendChild(entry);
      logBox.scrollTop = logBox.scrollHeight;
    }

    async function sendEvent(name, data = null) {
      const rawUrl = document.getElementById('workerUrl').value.trim();
      const siteId = document.getElementById('siteId').value.trim();
      
      if (!rawUrl || !siteId) {
        log('Error: Worker URL and Tracking Code are required!', 'error');
        return;
      }
      
      const endpoint = rawUrl.endsWith('/') ? rawUrl + 'api/track' : rawUrl + '/api/track';
      const sid = 'play_' + Math.random().toString(36).slice(2, 8);
      
      const payload = {
        site_id: siteId,
        pathname: window.location.pathname + '?verify=true',
        referrer: 'https://github.com/SudhirDevOps1/PrismAnalytics.git',
        screen_size: window.screen.width + 'x' + window.screen.height,
        session_id: sid,
        event_name: name,
        event_data: data
      };
      
      log('Sending payload to ' + endpoint + '...');
      
      try {
        const ok = navigator.sendBeacon(endpoint, JSON.stringify(payload));
        if (ok) {
          log('Success: Beacon queued successfully for "' + name + '"!', 'success');
        } else {
          // Fallback to fetch
          const res = await fetch(endpoint, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain' }
          });
          if (res.ok) {
            log('Success: Hit recorded for "' + name + '"!', 'success');
          } else {
            log('Failed: Server returned status ' + res.status, 'error');
          }
        }
      } catch (err) {
        log('Error sending event: ' + err.message, 'error');
      }
    }

    document.getElementById('btnPageview').addEventListener('click', () => sendEvent('pageview'));
    document.getElementById('btnCustom').addEventListener('click', () => {
      sendEvent('custom_click', { button_id: 'playground_verify', clicks: 1 });
    });
  </script>
</body>
</html>
