name: Deploy PrismAnalytics v1.0.0

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: 20

jobs:
  audit:
    name: Security & Type Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npm exec tsc -- --noEmit
      - name: ESLint (if configured)
        run: npm run lint --if-present
      - name: Check for leaked secrets
        run: |
          ! grep -R "JWT_SECRET.*=" src/ --include="*.ts" | grep -v "process.env" | grep -v "example" | grep -v "//"
          ! grep -R "sk_live\|api_key.*=.*['\"]" src/ --include="*.ts"
          echo "No hardcoded secrets found"

  deploy:
    name: Build & Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

      - name: Build Next.js preview
        run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/app_db
          JWT_SECRET: ci-test-secret-min-32-chars-long-enough

      - name: Build Cloudflare Worker assets (Vite)
        run: npx vite build

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply prism-analytics-db --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          sleep 10
          curl -sf https://prism-analytics.${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.workers.dev/api/health || echo "Health check — verify custom domain"
